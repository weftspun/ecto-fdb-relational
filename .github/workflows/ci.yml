name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  FRS_VERSION: "4.3.6.0" # org.foundationdb:fdb-relational-server on Maven Central

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        elixir: ["1.20"]
        otp: ["29"]
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore deps/build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}

      - name: Restore Rust NIF build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            native/ecto_fdb_relational_nif/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/ecto_fdb_relational_nif/Cargo.lock') }}

      # PLTs are rebuilt whenever the OTP/Elixir versions or deps change (the same
      # inputs dialyxir itself keys its PLT filenames on) -- see .dialyzer_ignore.exs
      # for the handful of warnings this doesn't otherwise cover.
      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: _build/dev/*.plt*
          key: ${{ runner.os }}-dialyzer-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}

      # native/ecto_fdb_relational_nif (a Rustler NIF that embeds a JVM -- see ADR 0003)
      # links against libjvm at compile time, and native/frl_bridge (the one Java class it
      # calls into) is compiled against the FRL jars, as ordinary parts of `mix compile`
      # now -- neither needs a live FoundationDB cluster, just the jar and a JDK/Rust
      # toolchain on the compiling machine.
      - name: Download fdb-relational-server ${{ env.FRS_VERSION }} (compile-time classpath only)
        run: |
          curl -fsSL -o /tmp/fdb-relational-server.jar \
            "https://repo1.maven.org/maven2/org/foundationdb/fdb-relational-server/${FRS_VERSION}/fdb-relational-server-${FRS_VERSION}-all.jar"
          echo "ECTO_FDB_RELATIONAL_CLASSPATH=/tmp/fdb-relational-server.jar" >> "$GITHUB_ENV"

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix dialyzer
      - run: mix test
        # test/ecto_fdb_relational/integration_test.exs skips itself here (no
        # FRL_TEST_CLUSTER_FILE) -- it runs for real in the `integration` job below.

  integration:
    name: Integration (real FoundationDB, FRL embedded in-process)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FDB_VERSION: "7.1.26" # matches the fdb client fdb-record-layer 4.3.6.0 pins
      FDB_CLUSTER_FILE: /etc/foundationdb/fdb.cluster
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore deps/build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-1.20-29-${{ hashFiles('mix.lock') }}

      - name: Restore Rust NIF build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            native/ecto_fdb_relational_nif/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('native/ecto_fdb_relational_nif/Cargo.lock') }}

      - name: Install FoundationDB ${{ env.FDB_VERSION }} (single-node, auto-configured)
        run: |
          curl -fsSL -o /tmp/fdb-clients.deb \
            "https://github.com/apple/foundationdb/releases/download/${FDB_VERSION}/foundationdb-clients_${FDB_VERSION}-1_amd64.deb"
          curl -fsSL -o /tmp/fdb-server.deb \
            "https://github.com/apple/foundationdb/releases/download/${FDB_VERSION}/foundationdb-server_${FDB_VERSION}-1_amd64.deb"
          sudo dpkg -i /tmp/fdb-clients.deb /tmp/fdb-server.deb
          # The server package auto-configures a single-node "test" database
          # (see its postinst) -- just wait for it to come up.
          for i in $(seq 1 30); do
            fdbcli --exec 'status minimal' | grep -q 'The database is available' && break
            sleep 2
          done
          fdbcli --exec status

      - name: Download fdb-relational-server ${{ env.FRS_VERSION }} (classpath for the embedded transport)
        run: |
          curl -fsSL -o /tmp/fdb-relational-server.jar \
            "https://repo1.maven.org/maven2/org/foundationdb/fdb-relational-server/${FRS_VERSION}/fdb-relational-server-${FRS_VERSION}-all.jar"
          echo "ECTO_FDB_RELATIONAL_CLASSPATH=/tmp/fdb-relational-server.jar" >> "$GITHUB_ENV"

      - run: mix deps.get

      - name: Run integration tests against a real FoundationDB cluster (no separate server process)
        env:
          FRL_TEST_CLUSTER_FILE: ${{ env.FDB_CLUSTER_FILE }}
        run: mix test test/ecto_fdb_relational/integration_test.exs
